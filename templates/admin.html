{% block content %}

<div class="container-fluid">

<h3 class="mb-4">Admin Control Panel</h3>

<!-- ================================= -->
<!-- SYSTEM MAINTENANCE -->
<!-- ================================= -->

<div class="card shadow-soft p-4 mb-4">

<h5 class="mb-3">System Maintenance</h5>

<div class="row g-3">

<!-- Update Company Metadata -->
<div class="col-md-4">

<form method="post" action="/admin/update-metadata">

<button class="btn btn-success w-100">
Update Company Metadata
</button>

</form>

<small class="text-muted">
Refresh sector & company metadata
</small>

</div>


<!-- Update Market Groups -->
<div class="col-md-4">

<form method="post" action="/admin/update-group-mapping">

<button class="btn btn-primary w-100">
Update Market Groups
</button>

</form>

<small class="text-muted">
Load NSE sectors & themes from CSV
</small>

</div>


<!-- Run Data Ingestion -->
<div class="col-md-4">

<form method="post" action="/admin/run-ingestion">

<button class="btn btn-dark w-100">
Run Data Ingestion
</button>

</form>

<small class="text-muted">
Fetch latest candle data
</small>

</div>

</div>
</div>

</div>

<!-- ================================= -->
<!-- USER MANAGEMENT -->
<!-- ================================= -->

<div class="card shadow-soft p-4">

<h5 class="mb-3">User Management</h5>

<!-- Add User -->

<form method="post" action="/admin/add-user" class="row g-2 mb-4">

<input type="hidden" name="csrf_token" value="{{ csrf_token }}">

<div class="col-md-5">

<input
type="email"
name="email"
class="form-control"
placeholder="User Email"
required>

</div>

<div class="col-md-3">

<select name="role" class="form-select">

<option value="viewer">Viewer</option>
<option value="trader">Trader</option>
<option value="admin">Admin</option>

</select>

</div>

<div class="col-md-2">

<button class="btn btn-primary w-100">
Add User
</button>

</div>

</form>

<!-- Users Table -->

<table class="table table-sm table-striped align-middle">

<thead>

<tr>
<th>Email</th>
<th>Role</th>
<th style="width:260px">Actions</th>
</tr>

</thead>

<tbody>

{% for u in users %}

<tr>

<td>{{ u.email }}</td>

<td>
<span class="badge bg-secondary">
{{ u.role }}
</span>
</td>

<td class="text-nowrap">

<div class="d-flex align-items-center gap-2">

<!-- Update Role -->
<form method="post"
      action="/admin/update-role"
      class="d-flex align-items-center gap-2"
      onsubmit="return validateRoleSelection(this)">

    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="email" value="{{ u.email }}">

    <select name="role"
            class="form-select form-select-sm"
            style="width:120px">

        <option value="select" selected>Select</option>
        <option value="viewer">viewer</option>
        <option value="trader">trader</option>
        <option value="admin">admin</option>

    </select>

    <button class="btn btn-sm btn-outline-primary">
        Update
    </button>

</form>

<!-- Delete User -->
<form method="post"
      action="/admin/delete-user">

    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="email" value="{{ u.email }}">

    <button class="btn btn-sm btn-outline-danger">
        Delete
    </button>

</form>

</div>

</td>

</tr>

{% endfor %}
<script>

function validateRoleSelection(form) {

    const role = form.role.value;

    if (role === "select") {
        alert("Please select a role before updating.");
        return false;
    }

    return true;
}

</script>
</tbody>

</table>

</div>

</div>

{% endblock %}
