<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nifty Dashboard</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 600; }
        .card { border: none; }
        .shadow-soft { box-shadow: 0 0.125rem 0.75rem rgba(0,0,0,.05); }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/dashboard">
            Nifty Analytics
        </a>

        <div class="d-flex">
            <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">
                Dashboard
            </a>

            {% if request.session.get("user") and request.session.get("user").role == "admin" %}
            <a href="/admin/strategy-lab" class="btn btn-outline-light btn-sm me-2">
                Strategy Lab
            </a>
            <a href="/admin" class="btn btn-outline-light btn-sm me-2">
                Admin
            </a>
            {% endif %}

            <a href="/logout" class="btn btn-danger btn-sm">
                Logout
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid py-4">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
